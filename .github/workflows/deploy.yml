name: Deploy
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t mortiz33/client -f client/Dockerfile.dev .
      - run: docker build -t mortiz33/server -f server/Dockerfile.dev .
      - run: docker build -t mortiz33/nginx -f nginx/Dockerfile.dev .
      - run: docker build -t mortiz33/worker -f worker/Dockerfile.dev .
